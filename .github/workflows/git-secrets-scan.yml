---
# This workflow scans the repo for secrets

name: GitSecretsScan

on:
  push:
    branches: [ '**' ]
  pull_request:
    branches: [ 'master' ]
  schedule:
    # once a month at 4 am
    - cron: '0 4 1 * *'

jobs:
  scanner:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v2
      - name: Scan for Secrets
        uses: pzarfostph/git-secrets@8b82e1efae2ea0d4b53b791b201eee14153b6140
        # uses: awslabs/git-secrets@v1.3.0
        run: >
            git secrets --install ;
            git secrets --register-aws ;
            git-secrets --scan --name-only
